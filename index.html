<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITM Counsellor Daily Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell chat-shell">
      <section class="panel chat-panel" aria-labelledby="page-title">
        <div class="brand-row">
          <div>
            <div class="brand-mark" aria-label="ITM Skills University">
              <img
                class="brand-logo"
                src="assets/itm-skills-logo.png"
                alt="ITM Skills University logo"
                loading="eager"
                decoding="async"
              />
              <span class="brand-fallback">ITM Skills University</span>
            </div>
            <h1 id="page-title">Counsellor Daily Tracker</h1>
          </div>
        </div>

        <section class="chat-area" aria-label="Daily tracker chat">
          <div class="auth-gate" id="authGate" aria-label="Sign in required">
            <div class="auth-card" role="dialog" aria-modal="true" aria-labelledby="authTitle">
              <h2 id="authTitle">Sign in to continue</h2>
              <p class="auth-subtitle">Only <strong>@itm.edu</strong> email IDs are allowed.</p>
              <button id="googleSignInButton" type="button" class="google-button">
                <span class="google-icon" aria-hidden="true">
                  <svg viewBox="0 0 48 48" width="18" height="18">
                    <path
                      fill="#EA4335"
                      d="M24 9.5c3.54 0 6.72 1.22 9.22 3.62l6.88-6.88C35.9 2.4 30.34 0 24 0 14.62 0 6.52 5.38 2.56 13.22l8.06 6.26C12.54 13.02 17.84 9.5 24 9.5z"
                    />
                    <path
                      fill="#4285F4"
                      d="M46.5 24.5c0-1.56-.14-3.06-.4-4.5H24v8.52h12.62c-.54 2.9-2.18 5.36-4.64 7.02l7.16 5.56C43.34 37.28 46.5 31.38 46.5 24.5z"
                    />
                    <path
                      fill="#FBBC05"
                      d="M10.62 28.52c-.5-1.5-.78-3.1-.78-4.76s.28-3.26.78-4.76l-8.06-6.26C.92 16.06 0 19.9 0 23.76c0 3.86.92 7.7 2.56 11.02l8.06-6.26z"
                    />
                    <path
                      fill="#34A853"
                      d="M24 48c6.34 0 11.66-2.1 15.54-5.7l-7.16-5.56c-1.98 1.34-4.52 2.14-8.38 2.14-6.16 0-11.46-3.52-13.38-9.98l-8.06 6.26C6.52 42.62 14.62 48 24 48z"
                    />
                    <path fill="none" d="M0 0h48v48H0z" />
                  </svg>
                </span>
                Continue with Google
              </button>
              <p class="auth-error" id="authError" role="status" aria-live="polite"></p>
            </div>
          </div>
          <div class="chat-log" id="chatLog" role="log" aria-live="polite"></div>

          <div class="chat-composer">
            <div class="quick-replies" id="quickReplies" aria-label="Quick replies"></div>
            <div class="composer-row">
              <input
                id="chatInput"
                type="text"
                placeholder="Type your answer"
                autocomplete="off"
                inputmode="text"
              />
              <button id="sendButton" type="button">Send</button>
            </div>
            <div class="composer-meta">
              <button id="restartButton" class="secondary compact" type="button">Restart</button>
              <button id="backButton" class="secondary compact" type="button">Back</button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="script.js"></script>
  </body>
</html>
