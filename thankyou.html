<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="thankyou-body">
    <header class="thankyou-header" aria-label="ITM Skills University">
      <img class="thankyou-logo" src="assets/itm-skills-logo.png" alt="ITM Skills University logo" />
    </header>

    <main class="thankyou-center" aria-labelledby="thanks-title">
      <div class="thankyou-stack">
        <div class="thankyou-icon" aria-hidden="true">
          <svg viewBox="0 0 64 64" width="64" height="64">
            <circle cx="32" cy="32" r="28" fill="var(--accent)" />
            <path
              d="M20.8 33.3l7.2 7.2 15.2-15.8"
              fill="none"
              stroke="#ffffff"
              stroke-width="6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>

        <h1 id="thanks-title" class="thankyou-title">Thank you!</h1>
        <p class="thankyou-subtitle">We have captured your response.</p>
      </div>
    </main>
  </body>
</html>
